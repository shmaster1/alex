<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wave Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f0;
      padding: 32px 28px;
      max-width: 860px;
      margin: 0 auto;
      color: #1a1a2e;
    }

    @media (max-width: 540px) {
      body { padding: 16px 14px; }
    }

    .top-card {
      background: linear-gradient(160deg, #d6ede0 0%, #c2e4cc 100%);
      border-radius: 24px;
      padding: 28px 36px 24px;
    }

    @media (max-width: 540px) {
      .top-card { padding: 20px 18px 18px; border-radius: 18px; }
    }

    .card-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      flex-wrap: wrap;
    }

    .card-left { flex: 1; min-width: 140px; }
    .location-name { font-size: 26px; font-weight: 700; }
    .datetime { font-size: 13px; color: #555; margin-top: 4px; }

    .calm-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: white;
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 13px;
      margin-top: 12px;
    }
    .calm-dot { width: 9px; height: 9px; border-radius: 50%; background: #4caf50; }

    .metrics {
      display: flex;
      gap: 0;
      align-items: center;
    }

    .period-block { text-align: center; padding: 0 24px; }
    .period-block:first-child { padding-left: 0; }

    .period-divider {
      font-size: 32px;
      font-weight: 300;
      color: #aaa;
      align-self: center;
      padding: 0 4px;
    }

    .metric-label {
      font-size: 11px;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 5px;
    }

    .period-wave {
      font-size: 46px;
      font-weight: 800;
      color: #1a9e8f;
      line-height: 1;
    }
    .period-wave sup { font-size: 16px; font-weight: 500; vertical-align: baseline; }

    .period-wind {
      font-size: 26px;
      font-weight: 700;
      color: #1a1a2e;
      margin-top: 6px;
    }
    .period-wind sup { font-size: 13px; font-weight: 500; }

    @media (max-width: 540px) {
      .period-wave { font-size: 36px; }
      .period-wind { font-size: 20px; }
      .period-block { padding: 0 14px; }
    }

    .msg-box {
      background: white;
      border-radius: 14px;
      padding: 14px 18px;
      margin-top: 22px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .msg-icon {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: #4caf50;
      display: flex; align-items: center; justify-content: center;
      color: white;
      font-size: 15px; font-weight: 700;
      flex-shrink: 0;
    }
    .msg-text { font-size: 14px; color: #333; line-height: 1.45; }
  </style>
</head>
<body>

<div class="top-card">
  <div class="card-row">
    <div class="card-left">
      <div class="location-name" id="locName">…</div>
      <div class="datetime" id="dtLine">Loading…</div>
      <div class="calm-badge">
        <span class="calm-dot" id="condDot"></span>
        <span id="condLabel">—</span>
      </div>
    </div>

    <div class="metrics">
      <div class="period-block">
        <div class="metric-label">Morning</div>
        <div class="period-wave" id="amWave">—<sup>m</sup></div>
        <div class="period-wind" id="amWind">—<sup>kn</sup></div>
      </div>
      <div class="period-divider">/</div>
      <div class="period-block">
        <div class="metric-label">Afternoon</div>
        <div class="period-wave" id="pmWave">—<sup>m</sup></div>
        <div class="period-wind" id="pmWind">—<sup>kn</sup></div>
      </div>
    </div>
  </div>

  <div class="msg-box">
    <div class="msg-icon" id="msgIcon">✓</div>
    <div class="msg-text" id="msgText">Fetching conditions…</div>
  </div>
</div>

<script>
const IDEAL_MAX   = 0.5;
const SAILING_MAX = 1.2;
const LOC_NAME    = 'Ashkelon';

async function fetchData() {
  const res = await fetch('/api/forecast');
  if (!res.ok) throw new Error(`Forecast fetch failed: ${res.status}`);
  const data = await res.json();
  return {
    label:   data.label,
    date:    data.date,
    amWave:  data.am_wave,
    amWind:  data.am_wind,
    pmWave:  data.pm_wave,
    pmWind:  data.pm_wind,
    avgWave: (data.am_wave + data.pm_wave) / 2,
  };
}

function condition(wave) {
  if (wave <= IDEAL_MAX)
    return { label: 'Ideal', dot: '#00c853', icon: '✓', bg: '#00c853', msg: 'Flat water — ideal conditions. Perfect time to head out.' };
  if (wave <= SAILING_MAX)
    return { label: 'Sailing', dot: '#ffab00', icon: '~', bg: '#ffab00', msg: `${wave.toFixed(1)} m swell — fine for sailing, expect some chop.` };
  return { label: 'Rough', dot: '#ef5350', icon: '!', bg: '#ef5350', msg: `${wave.toFixed(1)} m — too rough. Not a fun day on the water.` };
}

function setConditionUI(c) {
  document.getElementById('condLabel').textContent = c.label;
  document.getElementById('condDot').style.background = c.dot;
  document.getElementById('msgIcon').textContent = c.icon;
  document.getElementById('msgIcon').style.background = c.bg;
  document.getElementById('msgText').textContent = c.msg;
}

function showDay7(day) {
  document.getElementById('amWave').innerHTML = `${day.amWave.toFixed(1)}<sup>m</sup>`;
  document.getElementById('amWind').innerHTML = `${Math.round(day.amWind)}<sup>kn</sup>`;
  document.getElementById('pmWave').innerHTML = `${day.pmWave.toFixed(1)}<sup>m</sup>`;
  document.getElementById('pmWind').innerHTML = `${Math.round(day.pmWind)}<sup>kn</sup>`;
  document.getElementById('dtLine').textContent = `${day.label}, ${day.date} · 7 days from now`;
  setConditionUI(condition(day.avgWave));
}

function showError(msg) {
  document.getElementById('locName').textContent = LOC_NAME;
  document.getElementById('dtLine').textContent = '';
  document.getElementById('condLabel').textContent = 'Unavailable';
  document.getElementById('condDot').style.background = '#9e9e9e';
  document.getElementById('msgIcon').textContent = '!';
  document.getElementById('msgIcon').style.background = '#ef5350';
  document.getElementById('msgText').textContent = msg;
}

let retryTimer = null;

async function init() {
  document.getElementById('locName').textContent = LOC_NAME;
  clearTimeout(retryTimer);
  try {
    const day = await fetchData();
    showDay7(day);
  } catch (err) {
    showError('Unable to load weather data. Retrying in 30 seconds…');
    retryTimer = setTimeout(init, 30000);
  }
}

init();
</script>
</body>
</html>
